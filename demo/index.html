<!doctype html>
<html lang="en" data-theme="amethyst">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta
            name="description"
            content="@shiron/ui — a React 19 + Tailwind v4 component library with a Neo-Tokyo look, built on shadcn/ui, Radix, Base UI and Solar icons."
        />
        <title>@shiron/ui</title>
        <!-- Single Page Apps for GitHub Pages: restore the deep link the 404
             fallback stashed in the query string before the router boots. -->
        <script>
            (function () {
                var redirect = sessionStorage.redirect;
                delete sessionStorage.redirect;
                if (redirect && redirect !== location.href) {
                    history.replaceState(null, "", redirect);
                }
            })();
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
