name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm exec biome lint src
      - name: Unit tests
        run: pnpm test

  css-integrity:
    name: CSS integrity (headless browser)
    runs-on: ubuntu-latest
    # Non-blocking for now; promote to required once proven stable.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Browser tests
        run: pnpm test:browser
