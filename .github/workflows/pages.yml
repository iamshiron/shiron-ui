name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The project Pages site is served from /shiron-ui/. The demo sits at that
      # root; Storybook is nested under /shiron-ui/storybook/. Build the demo
      # first — Vite empties demo/dist — then emit Storybook into that dist.
      - name: Build demo
        run: pnpm -C demo build --base=/shiron-ui/

      # STORYBOOK_BASE_PATH sets Vite's `base` for the Storybook build (see
      # demo/.storybook/main.ts) so the preview iframe's assets resolve from the
      # nested subpath instead of the site root.
      - name: Build Storybook
        env:
          STORYBOOK_BASE_PATH: /shiron-ui/storybook/
        run: pnpm -C demo build-storybook --output-dir dist/storybook

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
